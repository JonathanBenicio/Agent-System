# 12. Rerank multimodal

Não basta buscar. Você precisa reranquear.

Ordem recomendada:

```text
1. Hybrid search
2. Vector search textual
3. Vector search visual
4. Semantic rerank
5. LLM rerank opcional
6. Filtro por permissão
7. Context packing
```

Critérios de rerank:

```text
score final =
  similaridade textual
+ similaridade visual
+ proximidade de página/seção
+ qualidade OCR
+ freshness
+ permissão
+ confiança do parser
```

***

# 13. Multimodal RAG + MAF

No Microsoft Agent Framework / Agent architecture, o ideal é tratar o multimodal RAG como uma **tool/capability** consumida pelo agente.

```text
MetaAgent
   ↓
Router
   ↓
MultimodalRagAgent
   ↓
Tools:
   - SearchKnowledgeTool
   - SearchImageTool
   - AnalyzeImageTool
   - ExtractTableTool
   - RetrieveDocumentPageTool
```

O MetaAgent decide:

```text
Se pergunta depende de imagem/documento visual:
    usar MultimodalRagAgent
Senão:
    usar TextRagAgent ou outro especialista
```

