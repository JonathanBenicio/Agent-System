# 16. Critérios de qualidade para produção

## Obrigatórios

*   Citações por página/imagem
*   Controle de permissão por documento
*   Logs de retrieval
*   Versionamento dos embeddings
*   Reindexação incremental
*   Avaliação de qualidade do OCR
*   Fallback para RAG textual
*   Fallback para análise direta da imagem

## Enterprise

*   Redação de PII
*   Detecção de prompt injection em documentos
*   Auditoria de qual imagem foi enviada ao LLM
*   Controle de quais modelos podem receber imagens sensíveis
*   Cache de descrições visuais
*   Cache de embeddings
*   Controle de custo por modalidade

