# 8. Chunking multimodal

No RAG tradicional, chunking é só quebrar texto. No multimodal, precisa preservar relação entre elementos.

## Estratégias:

### 8.1 Page-aware chunking

Agrupa conteúdo por página.

```text
PDF página 4
 ├── texto principal
 ├── imagem 1
 ├── tabela 1
 └── legenda
```

### 8.2 Layout-aware chunking

Preserva ordem visual:

```text
Título → parágrafo → gráfico → legenda → nota de rodapé
```

### 8.3 Figure-aware chunking

Cada figura vira um item pesquisável:

```text
Figura
 ├── imagem original
 ├── OCR
 ├── descrição visual
 ├── página
 ├── posição
 └── relação com parágrafo próximo
```

### 8.4 Table-aware chunking

Tabelas devem virar:

```text
Tabela original
 ├── markdown
 ├── JSON estruturado
 ├── resumo
 └── embedding
```

O tutorial de multimodal chunking do Azure AI Search cobre extração e chunking de texto e imagens, vetorização e envio de imagens cortadas para uma knowledge store. [\[learn.microsoft.com\]](https://learn.microsoft.com/en-us/azure/search/tutorial-multimodal)

