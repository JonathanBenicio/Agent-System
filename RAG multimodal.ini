# 9. Fluxo de pergunta multimodal

Exemplo:

> “O que o gráfico da página 8 indica sobre aumento de custos?”

Pipeline:

```text
Usuário pergunta
   ↓
Orchestrator detecta intenção visual
   ↓
MultimodalRagAgent selecionado
   ↓
Busca:
   - texto da página 8
   - imagens da página 8
   - descrição do gráfico
   - embedding visual
   ↓
Rerank multimodal
   ↓
LLM multimodal recebe:
   - pergunta
   - trecho textual
   - imagem do gráfico
   - metadados da página
   ↓
Resposta com citação
```

