# 2. Pipeline recomendado

## 2.1 Ingestão multimodal

```text
Upload documento/mídia
   ↓
Classificação do tipo de arquivo
   ↓
Extração de texto
   ↓
Extração de imagens/figuras/tabelas
   ↓
OCR, layout e metadados
   ↓
Descrição visual com modelo multimodal
   ↓
Embeddings textuais e/ou multimodais
   ↓
Indexação vetorial + armazenamento bruto
```

O Azure AI Search recomenda pipelines que extraem texto e imagens inline de documentos, descrevem imagens em linguagem natural, geram embeddings para texto e imagens em espaço vetorial compartilhado e preservam referências às imagens para uso posterior. [\[learn.microsoft.com\]](https://learn.microsoft.com/en-us/azure/search/multimodal-search-overview)

