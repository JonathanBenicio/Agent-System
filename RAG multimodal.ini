# 4. Estratégias de RAG multimodal

Existem três abordagens principais.

***

## Estratégia A — Image verbalization

Transforma imagens em texto descritivo.

```text
Imagem/diagrama
   ↓
Modelo vision gera descrição
   ↓
Descrição vira chunk textual
   ↓
Embedding textual
   ↓
Busca vetorial comum
```

Exemplo:

```text
Imagem: fluxograma de aprovação de férias

Descrição gerada:
"O diagrama mostra um fluxo onde o colaborador envia solicitação,
o gestor aprova, o RH valida saldo e o sistema envia confirmação."
```

Vantagens:

*   Mais simples
*   Funciona com vector DB textual
*   Fácil de auditar
*   Bom para documentos corporativos

Desvantagens:

*   Pode perder detalhes visuais
*   Depende da qualidade da descrição

A documentação do Azure AI Search cita “image verbalization” como uma abordagem onde um LLM gera descrições em linguagem natural para imagens e depois essas descrições são vetorizadas como texto. [\[learn.microsoft.com\]](https://learn.microsoft.com/en-us/azure/search/search-get-started-portal-image-search)

***

## Estratégia B — Embedding multimodal direto

Aqui texto e imagem são vetorizados em um mesmo espaço sem depender apenas de descrição textual.

```text
Texto → text embedding
Imagem → image embedding
Consulta → embedding multimodal
Busca → resultados textuais + visuais
```

Vantagens:

*   Melhor para busca visual
*   Captura similaridade semântica da imagem
*   Bom para diagramas, fotos e UI screenshots

Desvantagens:

*   Mais complexo
*   Depende de modelo multimodal
*   Pode exigir índice vetorial separado

O exemplo multimodal do Azure Search OpenAI Demo usa extração de imagens com Document Intelligence, armazenamento em Blob Storage, vetorização com Azure AI Vision e indexação no Azure AI Search. [\[github.com\]](https://github.com/Azure-Samples/azure-search-openai-demo/blob/main/docs/multimodal.md)

***

## Estratégia C — Híbrida recomendada

Essa é a melhor para sua plataforma:

```text
Imagem
 ├── descrição textual gerada por vision LLM
 ├── OCR
 ├── embedding textual da descrição
 ├── embedding visual direto
 └── metadados estruturais
```

Depois, no retrieval:

```text
Consulta do usuário
   ↓
Query understanding
   ↓
Busca textual + vetorial + visual
   ↓
Rerank
   ↓
Context packing
   ↓
LLM multimodal responde
```

Essa abordagem é bem alinhada com a recomendação de busca híbrida, combinando full-text search, vector search e semantic ranking para melhorar recuperação em cenários multimodais. [\[learn.microsoft.com\]](https://learn.microsoft.com/en-us/azure/search/multimodal-search-overview), [\[learn.microsoft.com\]](https://learn.microsoft.com/en-us/azure/search/retrieval-augmented-generation-overview)

