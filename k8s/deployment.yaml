apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-system
  labels:
    app: agentic-system
    team: starship
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentic-system
  template:
    metadata:
      labels:
        app: agentic-system
    spec:
      containers:
        - name: agentic-api
          image: agentic-system:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: AgenticSystem__OpenAI__ApiKey
              valueFrom:
                secretKeyRef:
                  name: agentic-secrets
                  key: openai-api-key
            - name: AgenticSystem__Jwt__SecretKey
              valueFrom:
                secretKeyRef:
                  name: agentic-secrets
                  key: jwt-secret-key
            - name: ConnectionStrings__SessionStore
              valueFrom:
                secretKeyRef:
                  name: agentic-secrets
                  key: postgres-connection-string
            - name: AgenticSystem__AdminApiKey
              valueFrom:
                secretKeyRef:
                  name: agentic-secrets
                  key: admin-api-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
