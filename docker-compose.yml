services:
  agentic-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      agentic-api:
        condition: service_healthy
    networks:
      - agentic-net

  agentic-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AgenticSystem__AdminApiKey=minha-chave-secreta-admin-123
      - AgenticSystem__Ollama__BaseUrl=http://ollama:11434
      - AgenticSystem__Ollama__DefaultModel=phi3
      - AgenticSystem__Ollama__EmbeddingModel=nomic-embed-text
      - AgenticSystem__Ollama__Enabled=true
      - AgenticSystem__Ollama__Priority=1
      - AgenticSystem__OpenAI__ApiKey=${OPENAI_API_KEY}
      - AgenticSystem__OpenAI__DefaultModel=gpt-4o-mini
      - AgenticSystem__OpenAI__Enabled=false
      - AgenticSystem__OpenAI__Priority=10
      - AgenticSystem__Gemini__ApiKey=${GEMINI_API_KEY}
      - AgenticSystem__Gemini__DefaultModel=gemini-3-pro-preview
      - AgenticSystem__Gemini__Enabled=true
      - AgenticSystem__Gemini__Priority=5
      - AgenticSystem__Claude__ApiKey=${CLAUDE_API_KEY}
      - AgenticSystem__Claude__DefaultModel=claude-sonnet-4-20250514
      - AgenticSystem__Claude__Enabled=false
      - AgenticSystem__Claude__Priority=3
      - AgenticSystem__OpenRouter__ApiKey=${OPENROUTER_API_KEY}
      - AgenticSystem__OpenRouter__DefaultModel=openrouter/auto
      - AgenticSystem__OpenRouter__Enabled=true
      - AgenticSystem__OpenRouter__Priority=4
      - AgenticSystem__Gateway__DefaultDailyBudget=50.00
      - AgenticSystem__Gateway__DefaultFailureThreshold=5
      - AgenticSystem__CollaborationWorkflow__EnableAdvancedWorkflow=false
      - AgenticSystem__CollaborationWorkflow__EnableConcurrentContextStage=true
      - AgenticSystem__RAG__ReRanking__Enabled=true
      - AgenticSystem__RAG__ReRanking__UseDedicatedProvider=true
      - AgenticSystem__RAG__ReRanking__DedicatedProvider=LocalOnnxCrossEncoder
      - AgenticSystem__Skills__ScanAssemblySkills=true
      - AgenticSystem__Skills__DynamicDirectory=skills
      - AgenticSystem__Skills__WatchDynamicDirectory=true
      - AgenticSystem__LocalExecution__StorageMode=PostgreSQL
      - AgenticSystem__Memory__VectorStoreType=PostgreSQL
      - ConnectionStrings__SessionStore=Host=postgres;Port=5432;Database=agentic;Username=agentic;Password=${POSTGRES_PASSWORD:-agentic_dev}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3
    networks:
      - agentic-net

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=agentic
      - POSTGRES_USER=agentic
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-agentic_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - agentic-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agentic-net

  ollama-pull:
    image: curlimages/curl:latest
    command: >
      sh -c "
        echo 'Aguardando Ollama iniciar...';
        while ! curl -s http://ollama:11434/api/tags > /dev/null; do sleep 2; done;
        echo 'Baixando modelo LLM primário (phi3)...';
        curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"phi3\"}';
        echo 'Baixando modelo LLM secundário (qwen2.5:0.5b)...';
        curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"qwen2.5:0.5b\"}';
        echo 'Baixando modelo de Embeddings (nomic-embed-text)...';
        curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"nomic-embed-text\"}';
        echo 'Modelos prontos e inicializados!';
      "
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - agentic-net

volumes:
  ollama-data:
  postgres-data:

networks:
  agentic-net:
    driver: bridge
