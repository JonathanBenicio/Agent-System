services:
  agentic-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AgenticSystem__OpenAI__ApiKey=${OPENAI_API_KEY}
      - AgenticSystem__OpenAI__DefaultModel=gpt-4o-mini
      - AgenticSystem__Ollama__BaseUrl=http://ollama:11434
      - AgenticSystem__Ollama__Enabled=true
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - agentic-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - agentic-net

volumes:
  ollama-data:

networks:
  agentic-net:
    driver: bridge
