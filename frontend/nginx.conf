server {
    listen 80;
    server_name localhost;

    # Resolver interno do Docker para resolução dinâmica de DNS e prevenção de cache permanente de IP
    resolver 127.0.0.11 valid=10s;

    # Pasta padrão onde os arquivos estáticos compilados do Vite estarão
    root /usr/share/nginx/html;
    index index.html;

    # Suporte a SPA (Single Page Application) - Redirecionar todas as rotas do React Router para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Reverso para a API do Backend (.NET Core)
    location /api/ {
        set $api_upstream http://agentic-api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Reverso com Suporte a WebSockets (SignalR) em /hubs
    location /hubs/ {
        set $hubs_upstream http://agentic-api:8080;
        proxy_pass $hubs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout longo para evitar desconexões acidentais de WebSockets
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Tratamento de erro padrão
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
